}
.-s-word {

.-s-char {

.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  grid-template-rows: repeat(17, auto);
  column-gap: var(--g-gap);
}

.poster {
  grid-column-start: 1;
  grid-column-end: 15;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  column-gap: var(--g-gap);
  align-items: start;

  margin-top: calc(var(--vh) * 70);
  margin-bottom: calc(var(--h1) * 2);
  color: #D7BDC9;

  position: relative;
}
.poster * {
  position: relative;
}
.image-bg {
  grid-column-start: 1;
  grid-column-end: 11;
  grid-row-start: 1;
  grid-row-end: 18;
  position: absolute;
  inset: 0;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}
.image-bg img {
  width: 100%;
  height: calc(100% + var(--vh,1vh) * 20);

  margin-bottom: calc(var(--vh,1vh) * -20); */

.top-center {

}
.bottom-center {

  text-align: center;
  margin-bottom: calc(var(--vw,1vw) * 20);
}
.decorative {
  grid-column-start: 1;
  grid-column-end: 11;
  grid-row-start: 1;
  grid-row-end: 2;
  justify-content: start;
  display: flex;
  gap: var(--g-gap);
  margin-top: calc(var(--vw,1vw) * 20);
  margin-left: var(--p);
}
.caption {
  grid-column-start: 8;
  grid-column-end: 10;
  grid-row-start: 2;
  grid-row-end: 3;

  margin-top: calc(var(--vw,1vw) * 40);
  margin-bottom: calc(var(--vw,1vw) * 20);
}


.title {
  align-self: center;
  color: #E6DFE4;
  text-transform: uppercase;
  font-size: calc(var(--vw,1vw) * 11);
  line-height: 0.8;
}
.shaping {
  grid-column-start: 1;
  grid-column-end: 11;
  grid-row-start: 4;
  grid-row-end: 5;

}
.a {

}
.distinct {

  margin-right: var(--p);
}
.identity {

  grid-row-end: 9;

}
.through {

.form {

}
.and {

  grid-column-end: 10;

  grid-row-end: 13;
  justify-self: right;
  text-align: right;
  margin-right: var(--p);
}
.colour {
  grid-column-start: 1;
  grid-column-end: 11;
  grid-row-start: 14;
  grid-row-end: 15;
  justify-self: right;
  text-align: right;
  color: var(--c-black);
  margin-right: var(--p);
}

  grid-column-start: 1;

}
.decorative-2 {

  grid-row-end: 13;

  justify-self: left;
}

.description {
  grid-column-start: 4;
  grid-column-end: 8;
  grid-row-start: 16;
  grid-row-end: 17;
  text-align: center;
  margin-top: calc(var(--vw,1vw) * 20);
  margin-bottom: calc(var(--vw,1vw) * 20);
}

.line {
  grid-column-start: 1;
  grid-column-end: 11;
  border-bottom: 1px solid #E6DFE4;
  height: 0;
  margin-left: var(--p);
  margin-right: var(--p);
}
.line-1 {
  grid-row-start: 3;
  grid-row-end: 4;
}
.line-2 {
  grid-row-start: 5;
  grid-row-end: 6;
}
.line-3 {
  grid-row-start: 7;
  grid-row-end: 8;
}
.line-4 {

}
.line-5 {

}
.line-6 {

.-splitted {
  display: flex;
  flex-wrap: wrap;
  overflow: hidden;
}
.-s-char {
  cursor: default;
  transform: translate3d(0, 120%, 0);
  will-change: transform;
}
.-splitted.-inview .-s-char {
  transform: translate3d(0, 0, 0);
  transition: transform 0.9s var(--easing-function);
  transition-delay: calc((var(--char-start) / 5) * 0.3s);
}



@media (max-width: 1024px) {

    window.StringTuneContext = stringTune;

  stringTune.use(StringTune.StringSplit);

    stringTune.start(0);
